name: CI - Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Run smoke test (no API)
        run: python test_smoke.py
        env:
          # Skip API test in CI — no key available
          AZURE_OPENAI_API_KEY: ""

      - name: Run integration tests
        if: env.AZURE_OPENAI_API_KEY != ''
        run: python test_integration.py
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}

      - name: Build executable
        run: python build.py

      - name: Verify exe was created
        run: |
          if (!(Test-Path "dist/ClipFix.exe")) { exit 1 }
          $size = (Get-Item "dist/ClipFix.exe").Length / 1MB
          Write-Host "Exe size: $([math]::Round($size, 1)) MB"

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipFix
          path: dist/ClipFix.exe
